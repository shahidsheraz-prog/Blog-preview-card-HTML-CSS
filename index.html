<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="cantainer-card">
        <article class="card">
        <img src="./assets/images/illustration-article.svg" alt="">
        
        <div class="content-card">
            <span class="badge">Learning</span>
        </div>
        <div class="publish-card">
            <span>Published 21 Dec 2023</span>
        </div>
        <div class="card-title">
            <h2><a href="">HTML & CSS foundations</a></h2>
        </div>
        <div class="card-description">
            <p>
                These languages are the backbone of every website, defining structure, content, and presentation.
            </p>
        </div>
        <footer class="card-author">
            <img class="avatar" src="./assets/images/image-avatar.webp" alt="Greg Hooper">
            <span class="author-name">Greg Hooper</span>
        </footer>
        </article>
    </main>
    


</body>
</html>
